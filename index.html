<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>👤 Gestión de Usuarios</h1>

    <div class="formulario">
        <input type="hidden" id="id">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="cedula" placeholder="Cédula">
        <input type="text" id="telefono" placeholder="Teléfono">
        <button onclick="guardar()">Guardar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cédula</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
    </table>
</div>

<script>
const API = "api.php";

function cargarUsuarios() {
    fetch(API)
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(u => {
            html += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.nombre}</td>
                    <td>${u.cedula}</td>
                    <td>${u.telefono}</td>
                    <td>
                        <button type="button" onclick="editar(${u.id},'${u.nombre}','${u.cedula}','${u.telefono}')">Editar</button>
                        <button type="button" class="rojo" onclick="eliminar(${u.id})">Eliminar</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById("tablaUsuarios").innerHTML = html || '<tr><td colspan="5">No hay usuarios aún</td></tr>';
    })
    .catch(error => {
        console.error('Error al cargar usuarios:', error);
        document.getElementById("tablaUsuarios").innerHTML = '<tr><td colspan="5">No se pudieron cargar los usuarios</td></tr>';
    });
}

function guardar() {
    const id = document.getElementById("id").value;
    const nombre = document.getElementById("nombre").value;
    const cedula = document.getElementById("cedula").value;
    const telefono = document.getElementById("telefono").value;

    const metodo = id ? "PUT" : "POST";
    const body = JSON.stringify({ id, nombre, cedula, telefono });

    fetch(API, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body
    })
    .then(res => {
        if (!res.ok) throw new Error('Error en la petición');
        limpiar();
        cargarUsuarios();
    })
    .catch(error => console.error('Error al guardar usuario:', error));
}

function editar(id,nombre,cedula,telefono){
    document.getElementById("id").value = id;
    document.getElementById("nombre").value = nombre;
    document.getElementById("cedula").value = cedula;
    document.getElementById("telefono").value = telefono;
}

function eliminar(id){
    if (confirm("¿Eliminar usuario?")){
        fetch(API, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({id})
        })
        .then(res => {
            if (!res.ok) throw new Error('Error en la eliminación');
            cargarUsuarios();
        })
        .catch(error => console.error('Error al eliminar usuario:', error));
    }
}

function limpiar(){
    document.getElementById("id").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("cedula").value = "";
    document.getElementById("telefono").value = "";
}

cargarUsuarios();
</script>

</body>
</html>
